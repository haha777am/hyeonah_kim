<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ART SHOW - HYEON AH KIM</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;1,400&family=Noto+Sans+KR:wght@300;400&display=swap" rel="stylesheet">
    <style>
        /* [1] 기본 테마 */
        body { margin: 0; background-color: #000; color: #fff; font-family: 'Noto Sans KR', sans-serif; overflow-x: hidden; }
        
        /* [2] 네비게이션 */
        header { position: fixed; top: 0; width: 100%; z-index: 1000; padding: 30px 0; display: flex; justify-content: center; }
        .nav-capsule { display: flex; background: rgba(255,255,255,0.08); border-radius: 50px; padding: 5px; backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.1); }
        .nav-capsule a { text-decoration: none; color: #666; padding: 10px 20px; border-radius: 50px; font-size: 13px; transition: 0.3s; }
        .nav-capsule a.active, .nav-capsule a:hover { color: #fff; background: rgba(255,255,255,0.15); }

        /* [3] 아카이브 컨테이너 */
        .container { padding: 180px 10% 100px; max-width: 1400px; margin: 0 auto; }
        .page-title { font-family: 'Playfair Display', serif; font-size: 5vw; margin-bottom: 80px; font-weight: 400; letter-spacing: -2px; }

        /* [4] 아트쇼 리스트 (영상 스타일 인터페이스) */
        .archive-list { border-top: 1px solid #222; }
        
        .archive-item {
            display: flex; justify-content: space-between; align-items: flex-end;
            padding: 45px 0; border-bottom: 1px solid #222;
            text-decoration: none; color: #fff; 
            transition: 0.5s cubic-bezier(0.19, 1, 0.22, 1);
            position: relative;
        }

        .archive-item:hover { border-bottom-color: #fff; padding-left: 20px; }

        .item-main { pointer-events: none; }
        .item-title { font-family: 'Playfair Display', serif; font-size: 3.5vw; line-height: 1; transition: 0.4s; }
        .archive-item:hover .item-title { font-style: italic; }
        
        .item-location { font-family: monospace; color: #555; font-size: 13px; margin-top: 10px; display: block; letter-spacing: 1px; }
        .item-year { font-family: monospace; color: #444; font-size: 18px; transition: 0.4s; }
        .archive-item:hover .item-year { color: #fff; }

        /* [5] 호버 시 나타나는 이미지 프리뷰 */
        .preview {
            position: fixed; top: 50%; right: 10%; transform: translateY(-50%) scale(0.8);
            width: 350px; height: 480px; opacity: 0; pointer-events: none;
            transition: 0.6s cubic-bezier(0.19, 1, 0.22, 1); z-index: 5;
        }
        .preview img { width: 100%; height: 100%; object-fit: cover; filter: grayscale(20%); }
        
        .archive-item:hover .preview { opacity: 1; right: 15%; transform: translateY(-50%) scale(1); }
    </style>
</head>
<body>

    <header>
        <div class="nav-capsule">
            <a href="index.html">HOME</a>
            <a href="work.html">WORK</a>
            <a href="artshow.html" class="active">ART SHOW</a>
            <a href="cv.html">C.V</a>
        </div>
    </header>

    <main class="container">
        <h1 class="page-title">Art Show Archive</h1>
        
        <div class="archive-list">
            
            <a href="#" class="archive-item">
                <div class="item-main">
                    <span class="item-title">Focus Art Fair: BOOM</span>
                    <span class="item-location">Carrousel du Louvre, Paris</span>
                </div>
                <span class="item-year">2022</span>
                <div class="preview"><img src="images/art_2022_paris.jpg" alt="Paris 2022"></div>
            </a>

            <a href="#" class="archive-item">
                <div class="item-main">
                    <span class="item-title">Focus: Color of Life</span>
                    <span class="item-location">Saatchi Gallery, London</span>
                </div>
                <span class="item-year">2021</span>
                <div class="preview"><img src="images/art_2021_london.jpg" alt="London 2021"></div>
            </a>

            <a href="#" class="archive-item">
                <div class="item-main">
                    <span class="item-title">Focus: Identity</span>
                    <span class="item-location">Atelier Richelieu, Paris</span>
                </div>
                <span class="item-year">2021</span>
                <div class="preview"><img src="images/art_2021_paris.jpg" alt="Paris 2021"></div>
            </a>

            <a href="#" class="archive-item">
                <div class="item-main">
                    <span class="item-title">Focus: Color of 3</span>
                    <span class="item-location">Espace Thorigny, Paris</span>
                </div>
                <span class="item-year">2020</span>
                <div class="preview"><img src="images/art_2020_paris.jpg" alt="Paris 2020"></div>
            </a>

        </div>
    </main>

</body>
</html>
