<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HYEON AH KIM — HOME</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;1,400&family=Noto+Sans+KR:wght@300;400&display=swap" rel="stylesheet">
    
    <style>
        /* [1] 기본 테마 */
        body { margin: 0; background-color: #000; color: #fff; font-family: 'Noto Sans KR', sans-serif; overflow: hidden; }
        
        /* [2] 네비게이션 고정 */
        header { position: fixed; top: 0; width: 100%; z-index: 1000; padding: 30px 0; display: flex; justify-content: center; }
        .nav-capsule { display: flex; background: rgba(255,255,255,0.08); border-radius: 50px; padding: 5px; backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.1); }
        .nav-capsule a { text-decoration: none; color: #666; padding: 10px 20px; border-radius: 50px; font-size: 13px; transition: 0.3s; }
        
        /* 현재 페이지(HOME) 활성화 상태 */
        .nav-capsule a.active, .nav-capsule a:hover { color: #fff; background: rgba(255,255,255,0.15); }

        /* [3] 메인 레이아웃 (영상의 느낌을 살린 배치) */
        .hero-section { height: 100vh; display: flex; align-items: center; justify-content: space-around; padding: 0 8%; }
        
        .hero-text h1 { font-family: 'Playfair Display', serif; font-size: 8vw; line-height: 0.9; margin: 0; font-weight: 400; }
        .hero-text p { font-family: monospace; color: #444; letter-spacing: 5px; margin-top: 20px; text-transform: uppercase; }

        /* 원형 비주얼 영역 */
        .circle-visual { width: 30vw; height: 30vw; border-radius: 50%; overflow: hidden; border: 1px solid #222; position: relative; background: #111; }
        .circle-visual img { width: 100%; height: 100%; object-fit: cover; filter: grayscale(1); transition: 1.5s cubic-bezier(0.19, 1, 0.22, 1); }
        .circle-visual:hover img { filter: grayscale(0); transform: scale(1.05); }

        /* 하단 스크롤 유도 문구 */
        .scroll-hint { position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%); font-size: 10px; color: #333; letter-spacing: 2px; font-family: monospace; }
    </style>
</head>
<body>

    <header>
        <div class="nav-capsule">
            <a href="index.html" class="active">HOME</a>
            <a href="work.html">WORK</a>
            <a href="artshow.html">ART SHOW</a>
            <a href="collab.html">COLLAB</a>
            <a href="cv.html">C.V</a>
        </div>
    </header>

    <main class="hero-section">
        <div class="hero-text">
            <h1>Hyeon Ah<br>Kim</h1>
            <p>Fashion Designer & Art Director</p>
        </div>

        <div class="circle-visual">
            <img src="main_visual.jpg" alt="Visual Concept">
        </div>
    </main>

    <div class="scroll-hint">NAVIGATE TO THE ARCHIVE</div>

</body>
</html>
