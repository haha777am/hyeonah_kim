    <style>
        /* [1] CSS 초기화 및 공통 스타일 */
        body {
            margin: 0; padding: 0;
            background-color: #000; color: #fff;
            font-family: 'Noto Sans KR', sans-serif;
            overflow-x: hidden; 
            cursor: none; 
        }

        /* --- 커스텀 커서 스타일 --- */
        .custom-cursor {
            position: fixed;
            top: 0; left: 0;
            width: 12px; height: 12px;
            background-color: #fff;
            border-radius: 50%;
            pointer-events: none; 
            z-index: 9999;
            transform: translate(-50%, -50%);
            transition: width 0.3s ease, height 0.3s ease, background-color 0.3s ease;
            mix-blend-mode: difference; 
        }
        .custom-cursor.hover {
            width: 45px; height: 45px;
            background-color: transparent;
            border: 1px solid #fff;
        }

        /* [2] 네비게이션 */
        header {
            position: fixed; top: 0; width: 100%; z-index: 1000;
            padding: 40px 0; display: flex; justify-content: center;
        }
        .nav-capsule {
            display: flex; background: rgba(255,255,255,0.08);
            border-radius: 50px; padding: 6px; backdrop-filter: blur(15px);
            border: 1px solid rgba(255,255,255,0.1);
        }
        .nav-capsule a {
            text-decoration: none; color: #777; padding: 10px 25px;
            border-radius: 50px; font-size: 13px; letter-spacing: 1px;
            transition: 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
        }
        .nav-capsule a:hover { color: #fff; }
        .nav-capsule a.active {
            color: #fff; background: rgba(255,255,255,0.15);
        }

        /* [3] 메인 인트로 레이아웃 */
        .main-intro {
            height: 100vh; display: flex; align-items: center;
            justify-content: space-between; padding: 0 10%;
        }
