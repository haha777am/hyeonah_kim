<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>C.V — HYEON AH KIM</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&family=Noto+Sans+KR:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        /* [1] 기존 스타일 유지 */
        body {
            margin: 0; background-color: #0b0b0b; color: #fff;
            font-family: 'Noto Sans KR', sans-serif; line-height: 1.6;
            overflow-x: hidden; cursor: none;
            animation: fadeInPage 0.8s ease forwards;
        }
        @keyframes fadeInPage { from { opacity: 0; } to { opacity: 1; } }
        body.fade-out { opacity: 0 !important; transition: opacity 0.5s ease; }

        .custom-cursor {
            position: fixed; top: 0; left: 0; width: 12px; height: 12px;
            background-color: #fff; border-radius: 50%; pointer-events: none; z-index: 9999;
            transform: translate(-50%, -50%); transition: width 0.3s ease, height 0.3s ease, background-color 0.3s ease; mix-blend-mode: difference;
        }
        .custom-cursor.hover { width: 45px; height: 45px; background-color: transparent; border: 1px solid #fff; }

        header {
            position: fixed; top: 0; width: 100%; z-index: 1000;
            padding: 40px 0; display: flex; justify-content: center;
        }
        .nav-capsule {
            display: flex; background: rgba(255,255,255,0.05);
            border-radius: 50px; padding: 6px; backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.1);
        }
        .nav-capsule a {
            text-decoration: none; color: #666; padding: 10px 25px;
            border-radius: 50px; font-size: 13px; transition: 0.4s;
        }
        .nav-capsule a.active, .nav-capsule a:hover { color: #fff; background: rgba(255,255,255,0.1); }

        .cv-container { padding: 180px 10% 100px; max-width: 1200px; margin: 0 auto; }

        /* 랜덤 사진 영역 */
        .random-photo-area { margin-bottom: 80px; text-align: center; }
        #random-img {
            width: 100%; max-width: 400px; height: 500px; object-fit: cover;
            filter: grayscale(100%); border: 1px solid rgba(255,255,255,0.1);
            transition: 0.5s;
        }
        #random-img:hover { filter: grayscale(0%); }

        .cv-hero { margin-bottom: 120px; }
        .cv-hero h1 {
            font-family: 'Playfair Display', serif;
            font-size: 8vw; line-height: 0.9; margin: 0;
            text-transform: uppercase; letter-spacing: -2px;
        }
        .cv-hero h1 span { color: #a68d60; }

        .cv-section { display: grid; grid-template-columns: 1fr 2fr; padding: 60px 0; border-top: 1px solid #222; }
        .section-title { font-family: monospace; color: #a68d60; font-size: 14px; letter-spacing: 3px; text-transform: uppercase; }

        .cv-list { list-style: none; padding: 0; margin: 0; }
        .cv-item { margin-bottom: 50px; }
        .cv-item h3 { font-size: 22px; margin: 0 0 10px 0; font-weight: 400; color: #fff; }
        .cv-item p { color: #888; margin: 0; font-size: 14.5px; line-height: 1.8; font-weight: 300; }
        .cv-item .date { font-family: monospace; color: #555; margin-bottom: 8px; display: block; font-size: 13px; letter-spacing: 1px; }

        /* ✨ Contact Form 스타일 (이미지와 비슷하게 구현) */
        .contact-form-wrapper {
            background: rgba(255,255,255,0.02); padding: 40px; border-radius: 5px;
        }
        .contact-form-wrapper h2 { font-family: 'Playfair Display', serif; font-size: 32px; margin-bottom: 10px; }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
        .form-group { display: flex; flex-direction: column; margin-bottom: 20px; }
        .form-group label { font-size: 12px; color: #666; margin-bottom: 8px; font-family: monospace; }
        .form-group input, .form-group textarea {
            background: transparent; border: 1px solid #333; padding: 12px; color: #fff;
            font-family: 'Noto Sans KR', sans-serif; outline: none; transition: 0.3s;
        }
        .form-group input:focus, .form-group textarea:focus { border-color: #a68d60; }
        
        .send-btn {
            background: #a68d60; color: #fff; border: none; padding: 15px 40px;
            font-family: monospace; letter-spacing: 2px; cursor: none; transition: 0.3s;
            float: right;
        }
        .send-btn:hover { background: #8e774f; }

        .secret-link { display: inline-block; margin-top: 50px; font-family: monospace; font-size: 12px; color: #333; letter-spacing: 2px; text-decoration: none; transition: 0.4s ease; }
        .secret-link:hover { color: #a68d60; }

        @media (max-width: 768px) {
            .cv-section { grid-template-columns: 1fr; gap: 30px; }
            .cv-hero h1 { font-size: 15vw; }
            .form-row { grid-template-columns: 1fr; }
            .custom-cursor { display: none; }
            body { cursor: auto; }
        }
    </style>
</head>
<body>

    <div class="custom-cursor"></div>

    <header>
        <div class="nav-capsule">
            <a href="index.html">HOME</a>
            <a href="work.html">WORK</a>
            <a href="artshow.html">ART SHOW</a>
            <a href="collab.html">COLLAB</a>
            <a href="cv.html" class="active">C.V</a>
        </div>
    </header>

    <main class="cv-container">
        <div class="random-photo-area">
            <img id="random-img" src="" alt="Random Archive Photo">
        </div>

        <div class="cv-hero">
            <p style="font-family: monospace; letter-spacing: 5px; color: #444; margin-bottom: 20px;">FASHION DESIGNER_HYEON AH KIM</p>
            <h1>CURRICULUM<br><span>VITAE</span></h1>
        </div>

        <section class="cv-section">
            <div class="section-title">Experience</div>
            <div class="cv-list">
                <div class="cv-item">
                    <span class="date">2024.01 — PRESENT</span>
                    <h3>Fashion Designer</h3>
                    <p>시즌 컨셉 기획 및 제안.<br>시즌 리서치, 샘플링 및 메인 생산 핸들링.</p>
                </div>
            </div>
        </section>

        <section class="cv-section">
            <div class="section-title">Get in Touch</div>
            <div class="contact-form-wrapper">
                <h2>I'd like to hear from you!</h2>
                <p style="color:#666; font-size: 14px; margin-bottom: 30px;">문의사항이 있거나 인사를 나누고 싶다면 아래 폼을 이용해 주세요.</p>
                
                <form id="contact-form">
                    <div class="form-row">
                        <div class="form-group">
                            <label>First Name</label>
                            <input type="text" name="first_name" required>
                        </div>
                        <div class="form-group">
                            <label>Last Name</label>
                            <input type="text" name="last_name" required>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Email *</label>
                        <input type="email" name="user_email" required>
                    </div>
                    <div class="form-group">
                        <label>Message</label>
                        <textarea name="message" rows="5" required></textarea>
                    </div>
                    <button type="submit" class="send-btn">SEND</button>
                </form>
            </div>
        </section>

        <div style="text-align: center;">
            <a href="bside.html" class="secret-link">[+] OFF THE RECORD</a>
        </div>
    </main>

    <script>
        // [1] 랜덤 이미지 로직
        const images = [
            'images/main1.jpg.jpg', 
            'images/main2.jpg.jpg', 
            'images/main3.jpg.jpg'
        ];
        const randomImgTag = document.getElementById('random-img');
        const randomIndex = Math.floor(Math.random() * images.length);
        randomImgTag.src = images[randomIndex];

        // [2] 커서 로직
        const cursor = document.querySelector('.custom-cursor');
        const links = document.querySelectorAll('a, button, input, textarea');

        document.addEventListener('mousemove', (e) => {
            cursor.style.left = e.clientX + 'px';
            cursor.style.top = e.clientY + 'px';
        });

        links.forEach(link => {
            link.addEventListener('mouseenter', () => { cursor.classList.add('hover'); });
            link.addEventListener('mouseleave', () => { cursor.classList.remove('hover'); });
        });

        // [3] 페이지 전환 효과
        document.querySelectorAll('.nav-capsule a').forEach(link => {
            link.addEventListener('click', function(e) {
                e.preventDefault();
                const targetUrl = this.href;
                document.body.classList.add('fade-out');
                setTimeout(() => { window.location.href = targetUrl; }, 500);
            });
        });

        // [4] 문의 폼 전송 알림 (실제 전송은 EmailJS 연동 추천)
        document.getElementById('contact-form').addEventListener('submit', function(e) {
            e.preventDefault();
            alert('메시지가 전송되었습니다. (실제 전송을 위해서는 EmailJS 설정을 완료해야 합니다!)');
            this.reset();
        });
    </script>
</body>
</html>
